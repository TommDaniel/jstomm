# ─── Cloudflare real IP ─────────────────────────────────────────────────────
# Keeps $remote_addr as the visitor IP (not Cloudflare's edge IP).
# Range list: https://www.cloudflare.com/ips/ (update periodically).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ─── HTTP → HTTPS ───────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ─── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name jstomm.com www.jstomm.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    client_max_body_size 25M;

    # ── Laravel API ──
    location /api {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage {
        root /var/www/html/public;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Radio proxies ──
    # Upstream radios sem HTTPS viram mixed content no browser. Redirecionamos
    # via nginx pra servir pelo mesmo origem/TLS. proxy_buffering off e
    # timeouts altos sao essenciais pra nao cortar streams infinitos.
    location = /stream/sepe {
        proxy_pass http://live.paineldj.com.br:9348/stream;
        proxy_set_header Host live.paineldj.com.br;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        proxy_redirect off;
    }

    # ── Frontend SPA ──
    location / {
        root /var/www/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets; Vite emits them under /assets with content hashes.
    location /assets/ {
        root /var/www/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
