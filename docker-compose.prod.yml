services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CERTS_DIR:-/opt/vo-70-anos/certs}:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vo_network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    env_file:
      - .env.prod
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vo_network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-vo_app}
      POSTGRES_USER: ${DB_USERNAME:-vo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-vo_user} -d ${DB_DATABASE:-vo_app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - vo_network

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - vo_network

volumes:
  pg_data:
  minio_data:
  app_storage:

networks:
  vo_network:
    driver: bridge
