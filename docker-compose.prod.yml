services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CERTS_DIR:-/opt/vo-70-anos/certs}:/etc/nginx/certs:ro
      # Mesma storage do app, ro — pra servir /storage/photos/* via symlink do public/
      - app_storage:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vo_network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    env_file:
      - .env.prod
    volumes:
      - app_storage:/var/www/html/storage
      # Fotos legadas em /storage/ do host, só leitura, pra o comando
      # photos:import-storage puxar sem duplicar espaço em disco.
      - ./storage:/var/legacy-photos:ro
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vo_network

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    command: ["php", "artisan", "schedule:work"]
    env_file:
      - .env.prod
    environment:
      MIGRATE_ON_BOOT: "false"
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vo_network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    env_file:
      - .env.prod
    environment:
      MIGRATE_ON_BOOT: "false"
    volumes:
      - app_storage:/var/www/html/storage
      - ./storage:/var/legacy-photos:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vo_network

  classifier:
    build:
      context: docker/classifier
      dockerfile: Dockerfile
    volumes:
      - classifier_models:/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "0.8"
    networks:
      - vo_network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-vo_app}
      POSTGRES_USER: ${DB_USERNAME:-vo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-vo_user} -d ${DB_DATABASE:-vo_app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - vo_network

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - vo_network

volumes:
  pg_data:
  minio_data:
  app_storage:
  classifier_models:

networks:
  vo_network:
    driver: bridge
