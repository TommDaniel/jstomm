services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/html
    depends_on:
      - app
      - frontend
    networks:
      - vo_network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
      - ./storage/app:/var/www/html/storage/app/public
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - vo_network

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    networks:
      - vo_network

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vo_app
      POSTGRES_USER: ${DB_USERNAME:-vo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vo_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-vo_user} -d vo_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vo_network

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_user}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - vo_network

volumes:
  pg_data:
  minio_data:

networks:
  vo_network:
    driver: bridge
