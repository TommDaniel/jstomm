name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend tests (Laravel + PHPUnit, sqlite in-memory) ────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, mbstring, gd, zip, exif, pcntl
          coverage: none
          tools: composer:v2

      - name: Cache composer deps
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-v2-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-v2-

      - name: Install composer deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare test env
        run: cp .env.testing .env

      - name: Env diagnostics
        run: |
          php --version
          php -m | sort
          ls vendor/sabre vendor/resend 2>&1 || true

      - name: Run PHPUnit
        run: php artisan test --stop-on-failure

  # ─── Frontend tests + build (vitest + tsc + vite build) ─────────────────
  test-frontend:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_MAPBOX_TOKEN: pk.ci-placeholder-token
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Vitest
        run: npm run test

      - name: Build
        run: npm run build

  # ─── Deploy (push to main only) ──────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          if [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ]; then
            echo "::error::Missing required secrets: VPS_SSH_KEY, VPS_HOST, VPS_USER"
            exit 1
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              "$VPS_USER@$VPS_HOST" \
              "cd /opt/vo-70-anos && ./scripts/deploy-vps.sh"
